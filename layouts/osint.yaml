# osint.yaml — OSINT investigation layout
# Launch: tmuxp load -y osint
session_name: osint
start_directory: ~/ops/osint
windows:
  - window_name: 🕵️ cockpit
    focus: true
    layout: tiled
    panes:
      - focus: true
        shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "dossier"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "dossier — name · aliases · accounts · locations · leads"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "shell"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "shell — primary"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "clock"
          - watch -n 60 -c 'date +"%H:%M  %Y-%m-%d UTC%z"'
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "evidence"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "evidence chain — sources · timestamps · hashes"

  - window_name: 👤 identity
    layout: tiled
    panes:
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "username"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "username — sherlock · whatsmyname · blackbird"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "email"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "email — h8mail · holehe · epieos"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "phone"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "phone — phoneinfoga · numlookup"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "face"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "name / face — pimeyes · google reverse"

  - window_name: 🌐 web
    layout: tiled
    panes:
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "domain"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "domain · whois · dns — amass · subfinder"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "wayback"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "wayback — waybackmachine · archive.today"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "search"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "search — google dorks · ddg · shodan"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "fetch"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "site fetch — curl · httpie · wget"

  - window_name: 📡 social
    layout: tiled
    panes:
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "twitter"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "twitter — twint · nitter · snscrape"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "instagram"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "instagram — instaloader · osintgram"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "linkedin/gh"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "linkedin / github — osint-framework"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "telegram"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "telegram / discord — tgscan · channel scrape"

  - window_name: 🗺️ geo
    layout: even-horizontal
    panes:
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "geoint"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "geoint — overpass-turbo · mapillary · google earth"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "exif"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "exif — exiftool · metadata"

  - window_name: 📝 report
    layout: even-horizontal
    panes:
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "report"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "report draft — markdown · maltego export"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "evidence"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "screenshots · archived sources"
