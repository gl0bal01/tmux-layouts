# docker.yaml — Docker / Compose workflow layout
# Launch: tmuxp load -y docker
session_name: docker
start_directory: ~/docker
windows:
  - window_name: 🐳 cockpit
    focus: true
    layout: main-vertical
    options:
      main-pane-width: 60%
    panes:
      - focus: true
        shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "lazydocker"
          - 'if command -v lazydocker >/dev/null 2>&1; then lazydocker; else watch -n 3 -c ''docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || echo "docker not running"''; fi'
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "compose"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "compose — docker compose up · down · logs"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "exec"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "exec / shell into containers"

  - window_name: 📜 logs
    layout: even-horizontal
    panes:
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "logs"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "docker logs -f <container>"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "compose logs"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "docker compose logs -f"

  - window_name: 🧪 scratch
    layout: even-horizontal
    panes:
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "scratch"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "scratch"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "scratch"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "scratch"
