# ctf.yaml — CTF competition workflow
# Launch: tmuxp load -y ctf
# Mirrors zellij-layouts/ctf.kdl 1:1 (cockpit/web/pwn/crypto/forensics/misc)
session_name: ctf
start_directory: ~/ops/ctf
windows:
  - window_name: 🏁 cockpit
    focus: true
    layout: tiled
    panes:
      - focus: true
        shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "tracker"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "challenge tracker — name · category · points · status"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "flags"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "flag log — echo 'FLAG{...}' >> flags.txt"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "submit"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "submit — curl flag · platform CLI"

  - window_name: 🌐 web
    layout: tiled
    panes:
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "requests"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "requests — curl · httpie · sqlmap · ffuf · feroxbuster"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "source"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "source — page source · JS · API responses"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "proxy"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "proxy — mitmproxy · burp CLI · caido"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "exploit"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "exploit — XSS · SQLi · SSTI · deserialization"

  - window_name: 💥 pwn
    layout: tiled
    panes:
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "gdb"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "debugger — gdb -q ./binary  (pwndbg/gef/peda)"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "disasm"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "disasm — objdump · radare2 · ghidra · cutter"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "pwntools"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "exploit — python3 exploit.py  (pwntools)"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "gadgets"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "checksec · ropper · ROPgadget · one_gadget"

  - window_name: 🔐 crypto
    layout: tiled
    panes:
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "repl"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "python3 · ipython · sage — pycryptodome/sympy/gmpy2/z3"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "solve.py"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "edit solve.py — \${EDITOR:-vim} solve.py"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "tools"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "tools — CyberChef · dcode · factordb · RsaCtfTool"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "scratch"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "scratch"

  - window_name: 🔎 forensics
    layout: tiled
    panes:
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "analyze"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "analyze — file · binwalk · foremost · volatility3 · exiftool · oletools"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "hex"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "hex — xxd · hexyl · strings · entropy"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "stego"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "carve — steghide · zsteg · stegsolve · openstego"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "pcap"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "pcap — tshark · tcpdump -r · NetworkMiner"

  - window_name: 🧰 misc
    layout: tiled
    panes:
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "solve"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "general solve"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "recon"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "recon — sherlock · theHarvester · exiftool"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "decode"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "decode — base64 · rot13 · CyberChef · dcode"
      - shell_command:
          - tmux select-pane -t "$TMUX_PANE" -T "scratch"
          - printf '\e[H\e[2J\e[2;36m▎ %s\e[0m\n\n' "scratch"
