# ~/.tmux.conf
# tmux-layouts — own configuration.

# ─── Prefix ──────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Sensible defaults bundle ────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,alacritty:RGB,wezterm:RGB,foot:RGB,kitty:RGB"
set -g focus-events on
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on
set -g set-titles on
set -g set-titles-string "#S / #W"

# Keep panes open after command exits so descriptive layouts hold.
set -g remain-on-exit off

# ─── Splits in same cwd ────────
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ─── Reload ──────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# ─── Vi mode + smart copy (fixes mouse-cross-pane bug) ───────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
# Constrain drag-end to the originating pane — fixes cross-pane copy capture.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear
bind -T copy-mode-vi y send -X copy-pipe-and-cancel

# ─── Clipboard auto-detect (Wayland → X11 → pbcopy) ──────────────────
# tmux-yank reads @override_copy_command at runtime.
if-shell '[ -n "$WAYLAND_DISPLAY" ] && command -v wl-copy >/dev/null 2>&1' \
    'set -g @override_copy_command "wl-copy"' \
    'if-shell "command -v xclip >/dev/null 2>&1" \
        "set -g @override_copy_command \"xclip -selection clipboard -in\"" \
        "if-shell \"command -v xsel >/dev/null 2>&1\" \
            \"set -g @override_copy_command \\\"xsel -i -b\\\"\" \
            \"set -g @override_copy_command \\\"pbcopy\\\"\"" '
set -g @yank_selection_mouse "clipboard"

# ─── Pane navigation (vim-tmux-navigator owns C-h/j/k/l) ─────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Status bar (Catppuccin handles look) ────────────────────────────
set -g status-position bottom
set -g status-interval 5

# ─── User overrides — sourced before plugin init ─────────────────────
if-shell '[ -f ~/.tmux.conf.local ]' 'source ~/.tmux.conf.local'

# ─── Plugins (TPM) ───────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

# Catppuccin theme
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_status_modules_right "session host date_time"

# tmux-continuum: auto-restore on tmux start, save every 15 min
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-thumbs: keyboard hint copy (sidesteps mouse cross-pane bug entirely)
set -g @thumbs-key Space
set -g @thumbs-command 'echo -n {} | wl-copy 2>/dev/null || echo -n {} | xclip -selection clipboard'

# Initialize TPM (must stay last)
run '~/.tmux/plugins/tpm/tpm'
